name: CD — Oracle Cloud

# Same pipeline as cd.yml but targets an Oracle Cloud VM.
# Uses OCI_* secrets instead of EC2_* secrets.
#
# Required GitHub secrets:
#   OCI_HOST          — public IP of your Oracle Cloud VM
#   OCI_USER          — SSH user (typically "ubuntu" for Ubuntu instances)
#   OCI_SSH_KEY       — private SSH key for the VM
#   GHCR_USERNAME     — GitHub username (lowercase)
#   GHCR_TOKEN        — GitHub PAT with read:packages scope
#   POSTGRES_PASSWORD — strong password for Postgres
#   JWT_SECRET        — long random string for JWT signing
#   APP_DOMAIN        — VM public IP or your domain (no https://)
#
# One-time VM setup: run deploy/setup-oracle.sh on the VM first.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
      ghcr-owner: ${{ steps.meta.outputs.owner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "sha-tag=$(echo "$GITHUB_SHA" | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/src/ChurchLearn.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/churchlearn-api:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/churchlearn-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=http://${{ secrets.APP_DOMAIN }}:5000/api
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/churchlearn-frontend:${{ steps.meta.outputs.sha-tag }}
            ghcr.io/${{ steps.meta.outputs.owner }}/churchlearn-frontend:latest

  deploy:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/deploy/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          GHCR_ORG: ${{ needs.build-and-push.outputs.ghcr-owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_ORG,GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -e
            DEPLOY_DIR="/deploy"

            # Save current image tag for rollback
            if [ -f "$DEPLOY_DIR/.last-image-tag" ]; then
              cp "$DEPLOY_DIR/.last-image-tag" "$DEPLOY_DIR/.previous-image-tag"
            fi
            echo "$IMAGE_TAG" > "$DEPLOY_DIR/.last-image-tag"

            # Authenticate to GHCR so we can pull private images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Pull and deploy new images
            cd "$DEPLOY_DIR"
            export GHCR_ORG="$GHCR_ORG"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker-compose.prod.yml pull api frontend
            docker compose -f docker-compose.prod.yml up -d

            # Health check with retries (3 attempts, 10s wait each)
            HEALTHY=false
            for i in 1 2 3; do
              sleep 10
              if curl -sf http://localhost:5000/api/health; then
                HEALTHY=true
                break
              fi
              echo "Health check attempt $i failed"
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "Deployment successful — image tag: $IMAGE_TAG"
            else
              echo "Health check failed — rolling back..."
              if [ -f "$DEPLOY_DIR/.previous-image-tag" ]; then
                PREV_TAG=$(cat "$DEPLOY_DIR/.previous-image-tag")
                export IMAGE_TAG="$PREV_TAG"
                docker compose -f docker-compose.prod.yml pull api frontend
                docker compose -f docker-compose.prod.yml up -d
                echo "Rolled back to $PREV_TAG"
              else
                echo "No previous image tag found. Manual intervention required."
              fi
              exit 1
            fi
